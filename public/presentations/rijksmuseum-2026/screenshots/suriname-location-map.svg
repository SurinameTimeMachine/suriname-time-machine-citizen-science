<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">World map showing Suriname in northern South America</title>
  <desc id="desc">Stylized world map with Suriname highlighted and labeled on the north coast of South America.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f7f2" />
      <stop offset="100%" stop-color="#d7efe8" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0b3d35" flood-opacity="0.2" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />

  <g fill="#9ccdbf" stroke="#4e8f7f" stroke-width="4" opacity="0.95">
    <path d="M120 360 L180 300 L290 270 L360 295 L420 330 L390 385 L285 420 L180 430 L125 392 Z" />
    <path d="M430 470 L500 450 L570 470 L555 530 L520 595 L470 640 L430 615 L410 550 Z" />
    <path d="M640 250 L730 210 L850 205 L1000 235 L1090 270 L1080 350 L1000 390 L905 395 L815 365 L730 360 L675 320 Z" />
    <path d="M780 430 L855 420 L920 460 L945 535 L915 625 L855 700 L800 760 L745 730 L725 650 L740 560 L765 495 Z" />
    <path d="M1110 290 L1185 265 L1240 300 L1205 350 L1135 355 Z" />
    <path d="M1185 430 L1285 395 L1410 420 L1470 475 L1440 560 L1340 585 L1240 565 L1180 505 Z" />
  </g>

  <path d="M779 472 L804 468 L812 485 L804 506 L784 508 L772 492 Z" fill="#f16e45" stroke="#a23b21" stroke-width="4" filter="url(#softShadow)" />

  <circle cx="793" cy="488" r="10" fill="#ffffff" stroke="#a23b21" stroke-width="3" />

  <path d="M813 486 C895 455, 980 430, 1080 390" fill="none" stroke="#a23b21" stroke-width="4" stroke-linecap="round" />

  <rect x="1080" y="330" width="360" height="130" rx="16" fill="#ffffff" stroke="#1f5d51" stroke-width="4" filter="url(#softShadow)" />
  <text x="1110" y="385" fill="#0f453a" font-family="Arial, sans-serif" font-size="46" font-weight="700">Suriname</text>
  <text x="1110" y="425" fill="#2f7365" font-family="Arial, sans-serif" font-size="28">Northern coast of South America</text>

  <text x="80" y="840" fill="#2f7365" font-family="Arial, sans-serif" font-size="28">Context map for audience orientation</text>
</svg>
