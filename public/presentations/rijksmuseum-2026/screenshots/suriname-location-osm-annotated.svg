<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenStreetMap view with Suriname highlighted</title>
  <desc id="desc">Real map of northern South America from OpenStreetMap with a highlighted marker and label for Suriname.</desc>

  <image href="/presentations/rijksmuseum-2026/screenshots/suriname-location-osm.png" x="0" y="0" width="1600" height="900" preserveAspectRatio="xMidYMid slice" />

  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35" />
    </filter>
  </defs>

  <circle cx="875" cy="445" r="11" fill="#ffffff" opacity="0.9" />
  <circle cx="875" cy="445" r="8" fill="#d9472b" stroke="#ffffff" stroke-width="2" filter="url(#shadow)" />

  <path d="M886 438 C944 398, 1020 355, 1125 320" fill="none" stroke="#d9472b" stroke-width="4" stroke-linecap="round" filter="url(#shadow)" />

  <rect x="1118" y="284" width="246" height="58" rx="10" fill="#ffffff" opacity="0.95" stroke="#1d5f53" stroke-width="3" filter="url(#shadow)" />
  <text x="1140" y="322" fill="#11463d" font-family="Arial, sans-serif" font-size="34" font-weight="700">Suriname</text>
</svg>
